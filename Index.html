<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <h1>BMI Calculator</h1>

    <form id="bmiForm">

        <div class="form-group">
           <label for="weight">Weight (Kg)</label>
           <input type="number" id="weight" placeholder="Please enter your weight" step="0.1" min="0"> 
        </div>

        <div class="form-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" placeholder="Please enter your height" step="0.1" min="0">
        </div>

        <button type="submit" class="btn" id="submitBtn">Calculate</button>
        <button type="reset" class="btn" id="resetBtn">Reset</button>
    </form>

    <div class="result" id="result">
        <p class="label"> Your BMI is </p>
        <p class="bmi-value" id="bmiValue">0</p>

        <p class="bmi-category" id="bmiCategory">This is the Default Category</p>
   </div>

    <script src="script.js"></script>
</body>
</html>
